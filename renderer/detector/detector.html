<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' blob: data: file:;
                 script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob: file:;
                 worker-src 'self' blob:;
                 img-src 'self' data: blob:;
                 font-src 'self' file: data:;
                 media-src 'self' blob:;
                 connect-src 'self' blob: file:;" />
  <link rel="stylesheet" href="../../node_modules/pretendard/dist/web/static/pretendard.css" />
  <title>JJUUK 자세 측정</title>
  <style>
    /* Apple-styled palette — Pretendard substituted for SF Pro. Key color: green. */
    :root {
      --canvas: #ffffff;
      --canvas-parchment: #f5f5f7;
      --ink: #1d1d1f;
      --ink-muted: #6e6e73;
      --ink-muted-soft: #86868b;
      --primary: #2fa46a;
      --primary-focus: #248256;
      --primary-soft: rgba(47, 164, 106, 0.10);
      --hairline: #d2d2d7;
      --guide: #d2d2d7;
      --success: #2fa46a;
      --danger: #d93b3b;
      --warn: #b97a17;
      --preview-bg: #000000;
      --preview-shadow: 0 3px 5px rgba(0, 0, 0, 0.04), 0 8px 30px rgba(0, 0, 0, 0.12);
    }
    body.dark {
      --canvas: #1d1d1f;
      --canvas-parchment: #161617;
      --ink: #f5f5f7;
      --ink-muted: #a1a1a6;
      --ink-muted-soft: #86868b;
      --primary: #4ade80;
      --primary-focus: #4ade80;
      --primary-soft: rgba(74, 222, 128, 0.16);
      --hairline: #3a3a3c;
      --guide: #48484a;
      --success: #4ade80;
      --danger: #ff6961;
      --warn: #f5a623;
      --preview-bg: #000000;
      --preview-shadow: 0 3px 5px rgba(0, 0, 0, 0.2), 0 8px 30px rgba(0, 0, 0, 0.5);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--canvas);
      color: var(--ink);
      font-family: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.2s, color 0.2s;
    }

    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 40px 20px;   /* 위쪽 40 / 아래는 버튼을 끌어올리며 더 축소 */
      gap: 0;
    }

    /* ── header ─────────────────────────────────────────────── */
    .header {
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;                  /* title → subtitle 행간 (4 → 8) — 작아진 타이틀에 맞춰 약간 여유 */
      margin-bottom: 18px;       /* header → preview 간격 */
    }
    .title {
      font-size: 23px;            /* 28 → 23, 측정 화면에서 살짝 작게 */
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.022em;
      line-height: 1.18;
      margin: 0;
    }
    .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: var(--ink-muted);
      letter-spacing: -0.012em;
      line-height: 1.4;
      margin: 0;
      min-height: 22px;
    }
    .subtitle.success { color: var(--success); font-weight: 500; }
    .subtitle.warning { color: var(--warn);    font-weight: 500; }

    /* ── stage (preview + face guide) ───────────────────────── */
    .stage {
      width: 100%;
      max-width: 640px;
      align-self: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--preview-bg);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--preview-shadow);
    }
    #cam, #frozenFrame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #frozenFrame[hidden] { display: none; }

    .face-guide {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 28%;                       /* 살짝 축소 (32 → 28) */
      aspect-ratio: 1 / 1;
      border: 3px solid var(--guide);
      border-radius: 14px;
      pointer-events: none;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.18);
      transition: border-color 0.15s ease;
    }
    .face-guide.inside  { border-color: var(--success); }
    .face-guide.outside { border-color: var(--danger); }

    .progress-bar {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 4px;
      background: rgba(255,255,255,0.15);
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: var(--primary);
      transition: width 0.1s linear;
    }

    /* ── footer (messages + actions) ── */
    /* 기본 10px (카메라랑 가깝게) — ready/done/invalid 처럼 버튼이 있는 화면용. */
    /* 측정 중에만 26px 로 늘려서 두 줄 안내문구가 카메라에 답답하게 붙지 않게. */
    .footer {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    body[data-phase="measuring"] .footer {
      margin-top: 26px;
    }
    .messages {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 평상시(한 줄) 기준 — 측정 중 두 줄로 늘어나는 건 버튼이 숨겨진 상태라 무방 */
      min-height: 22px;
      gap: 2px;
    }
    #status {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: -0.012em;
      line-height: 1.42;
      color: var(--ink-muted);
      text-align: center;
      min-height: 20px;
      margin: 0;
    }
    #status.ready   { color: var(--success); font-weight: 500; }
    #status.error   { color: var(--danger);  font-weight: 500; }
    #status.outside { color: var(--danger);  font-weight: 500; }
    #subMessage {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: -0.01em;
      line-height: 1.4;
      color: var(--success);
      text-align: center;
      /* 비었을 때는 자리를 차지하지 않음 — 측정 중에만 한 줄 추가 */
      min-height: 0;
      margin: 0;
    }
    #subMessage.warning { color: var(--danger); font-weight: 500; }
    .progress-fill.warning { background: var(--danger); }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: inherit;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.012em;
      line-height: 1;
      padding: 12px 28px;
      border-radius: 9999px;          /* pill */
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.06s ease, opacity 0.15s ease;
      min-width: 132px;
      text-align: center;
    }
    .btn:focus-visible {
      outline: 2px solid var(--primary-focus);
      outline-offset: 2px;
    }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn.primary {
      background: var(--primary);
      color: #ffffff;
    }
    .btn.primary:hover:not(:disabled)  { background: var(--primary-focus); }
    body.dark .btn.primary { color: #1d1d1f; }

    .btn.secondary {
      background: transparent;
      color: var(--primary);
      border-color: var(--primary);
    }
    .btn.secondary:hover:not(:disabled) { background: var(--primary-soft); }
    /* 측정 실패(invalid) 상태에서 다시 찍기를 빨간색 톤으로 강조 */
    .btn.secondary.danger {
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn.secondary.danger:hover:not(:disabled) { background: rgba(217, 59, 59, 0.10); }
    body.dark .btn.secondary.danger:hover:not(:disabled) { background: rgba(255, 105, 97, 0.16); }

    /* ── 카메라 에러 패널 (preview 위에 절대 위치) ── */
    .camera-error-panel {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 14px;
      text-align: center;
      color: #ffffff;
      border-radius: 18px;
    }
    .camera-error-panel .err-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.012em;
      margin: 0;
    }
    .camera-error-panel .err-body {
      font-size: 13px;
      color: #d2d2d7;
      max-width: 420px;
      line-height: 1.5;
      letter-spacing: -0.008em;
      margin: 0;
    }
    .camera-error-panel .err-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .camera-error-panel .btn {
      font-size: 14px;
      padding: 9px 18px;
      min-width: 0;
    }
    .camera-error-panel .btn.primary {
      background: #ffffff;
      color: #1d1d1f;
    }
    .camera-error-panel .btn.primary:hover:not(:disabled) {
      background: #f0f0f0;
    }
    .camera-error-panel .btn.secondary {
      background: transparent;
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.5);
    }
    .camera-error-panel .btn.secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.12);
    }

    /* ── 인트로 오버레이 (카메라 켜기 전 인사 + 개인정보 동의) ── */
    .intro-overlay {
      position: fixed;
      inset: 0;
      background: var(--canvas);
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      animation: introFadeIn 0.25s ease;
    }
    .intro-overlay[hidden] { display: none; }
    @keyframes introFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .intro-card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .intro-mark {
      display: block;
      width: 64px;
      height: 64px;
      margin: 0 auto;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
    }
    /* 트레이 로고가 검은 실루엣이라 다크모드에서 invert + 살짝 밝게 */
    body.dark .intro-mark {
      filter: invert(1) brightness(0.96);
    }
    .intro-desc {
      font-size: 15px;
      color: var(--ink-muted);
      letter-spacing: -0.012em;
      line-height: 1.5;
      /* 로고와 가깝게 끌어올림 (intro-card gap 18px → 실효 약 10px) */
      margin: -8px 0 0 0;
      text-align: center;
    }
    .intro-privacy {
      margin-top: 4px;
      padding: 16px 18px;
      background: var(--canvas-parchment);
      border-radius: 14px;
    }
    .intro-privacy-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.008em;
      margin-bottom: 8px;
    }
    .intro-privacy-title .lock {
      display: inline-block;
      margin-right: 6px;
      transform: translateY(1px);
    }
    .intro-privacy-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .intro-privacy-list li {
      font-size: 13px;
      color: var(--ink-muted);
      line-height: 1.5;
      letter-spacing: -0.008em;
      padding-left: 14px;
      position: relative;
    }
    .intro-privacy-list li::before {
      content: '·';
      position: absolute;
      left: 4px;
      color: var(--primary);
      font-weight: 700;
    }
    .intro-privacy-list li strong {
      color: var(--ink);
      font-weight: 600;
    }
    .intro-actions {
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }
    .intro-desc strong {
      color: var(--ink);
      font-weight: 600;
    }

    /* ── 측정 완료 오버레이 (체크 그려지는 애니메이션 + 멘트) ── */
    .success-overlay {
      position: fixed;
      inset: 0;
      background: var(--canvas);
      z-index: 60;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 40px;
      animation: successFadeIn 0.25s ease;
    }
    .success-overlay[hidden] { display: none; }
    @keyframes successFadeIn {
      from { opacity: 0; transform: scale(0.985); }
      to   { opacity: 1; transform: scale(1); }
    }
    .success-check {
      width: 104px;
      height: 104px;
    }
    /* 원 → 0.6s 그려짐, 체크 → 0.5s 딜레이 후 0.4s 에 걸쳐 그려짐 */
    .success-check .ring {
      stroke: var(--primary);
      stroke-width: 4;
      fill: none;
      stroke-dasharray: 226;          /* 2π × r(36) ≈ 226 */
      stroke-dashoffset: 226;
      transform-origin: 40px 40px;
      transform: rotate(-90deg);      /* 12시 방향에서 시계방향 */
      animation: ring-draw 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .success-check .tick {
      stroke: var(--primary);
      stroke-width: 6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: tick-draw 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }
    @keyframes ring-draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes tick-draw {
      to { stroke-dashoffset: 0; }
    }
    .success-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.022em;
      margin: 0;
      text-align: center;
      opacity: 0;
      animation: successCopy 0.4s ease 0.55s forwards;
    }
    .success-desc {
      font-size: 15px;
      color: var(--ink-muted);
      letter-spacing: -0.012em;
      line-height: 1.5;
      margin: 0;
      text-align: center;
      opacity: 0;
      animation: successCopy 0.4s ease 0.7s forwards;
    }
    @keyframes successCopy {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <h1 class="title">바른 자세를 기억해 둘게요</h1>
      <p class="subtitle">박스 안에 얼굴이 들어오도록 편하게 앉아주세요</p>
    </header>

    <div class="stage">
      <div class="preview">
        <video id="cam" autoplay playsinline muted></video>
        <canvas id="frozenFrame" hidden></canvas>
        <div id="faceGuide" class="face-guide"></div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>

        <div id="cameraErrorPanel" class="camera-error-panel" hidden>
          <div id="cameraErrorMessage">
            <h2 class="err-title">카메라를 사용할 수 없어요</h2>
            <p class="err-body"></p>
          </div>
          <div class="err-actions">
            <button id="cameraRetryBtn" class="btn primary">다시 시도</button>
            <button id="cameraSettingsBtn" class="btn secondary">OS 카메라 설정 열기</button>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="messages">
        <div id="status">준비하는 중이에요…</div>
        <div id="subMessage"></div>
      </div>
      <div class="actions">
        <button id="startBtn" class="btn primary" disabled>측정 시작</button>
        <button id="retakeBtn" class="btn secondary" hidden>다시 찍기</button>
        <button id="confirmBtn" class="btn primary" hidden>이대로 좋아요</button>
      </div>
    </div>
  </div>

  <!-- 인트로 — 측정 직전 호출됨 (showIntro). 기본은 hidden — 사용자가 [측정 시작] 눌렀을 때만 노출. -->
  <div id="introOverlay" class="intro-overlay" hidden>
    <div class="intro-card">
      <img class="intro-mark" src="../../assets/tray/icon@2x.png" alt="JJUUK" />
      <p class="intro-desc">
        자세가 흐트러진 그 순간,<br/>
        <strong>쭉(JJUUK)이 알려드려요</strong>
      </p>
      <div class="intro-privacy">
        <div class="intro-privacy-title"><span class="lock"></span>촬영되는 개인정보 안내</div>
        <ul class="intro-privacy-list">
          <li>자세를 보기 위해 웹캠 영상을 사용해요</li>
          <li>영상은 <strong>컴퓨터 안에서만</strong> 분석되고, 어디에도 저장되거나 전송되지 않아요</li>
          <li>분석이 끝난 영상 프레임은 즉시 메모리에서 사라져요</li>
          <li>일시정지하면 카메라 LED 도 함께 꺼져요</li>
        </ul>
      </div>
      <div class="intro-actions">
        <button id="introStartBtn" class="btn primary">시작하기</button>
      </div>
    </div>
  </div>

  <!-- 측정 완료 — confirmBtn(이대로 좋아요) 누르면 잠시 노출 후 자동 닫힘. -->
  <div id="successOverlay" class="success-overlay" hidden>
    <svg class="success-check" viewBox="0 0 80 80" aria-hidden="true">
      <circle class="ring" cx="40" cy="40" r="36" />
      <path class="tick" d="M22 42 L36 56 L60 28" />
    </svg>
    <h2 class="success-title">측정 완료!</h2>
    <p class="success-desc">이 자세를 기준으로 자세를 봐드릴게요</p>
  </div>

  <script type="module" src="detector.js"></script>
</body>
</html>
