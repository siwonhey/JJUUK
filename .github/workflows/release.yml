name: Release

# v로 시작하는 태그(v0.1.1 등)를 push하면 macOS·Windows 빌드를 만들어
# GitHub Releases에 자동 업로드한다. 설치된 앱들은 이 Release를 보고 자동 업데이트된다.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Release 생성/업로드에 필요

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # 인증서(CSC_LINK) 시크릿 유무 판별. if: 에서는 secrets를 직접 못 읽어 output으로 우회.
      - name: Detect macOS signing
        id: macsign
        shell: bash
        run: echo "enabled=${{ secrets.CSC_LINK != '' }}" >> "$GITHUB_OUTPUT"

      # 인증서 없음 → CSC_* 를 아예 전달하지 않고 unsigned(adhoc)로 빌드.
      # (빈 문자열 CSC_LINK="" 를 넘기면 electron-builder가 서명 시도하다 실패하므로 키 자체를 생략)
      - name: Build and publish (unsigned)
        if: ${{ steps.macsign.outputs.enabled != 'true' }}
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # 인증서 있음 → 서명·공증해서 빌드. 아래 시크릿을 저장소에 추가하면 자동으로 이 경로를 탄다.
      #   CSC_LINK(.p12 base64) / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
      - name: Build and publish (signed)
        if: ${{ steps.macsign.outputs.enabled == 'true' }}
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
