name: Release

# v로 시작하는 태그(v0.1.1 등)를 push하면 macOS·Windows 빌드를 만들어
# GitHub Releases에 자동 업로드한다. 설치된 앱들은 이 Release를 보고 자동 업데이트된다.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Release 생성/업로드에 필요

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 코드 서명을 켜려면 아래 시크릿을 저장소에 추가하면 자동 적용된다.
          #   CSC_LINK            : .p12 인증서 (base64)
          #   CSC_KEY_PASSWORD    : .p12 비밀번호
          #   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID : 공증(notarize)용
          # 인증서(CSC_LINK)가 없으면 서명 탐색을 꺼서 unsigned로 빌드한다(없을 때 빌드 실패 방지).
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
